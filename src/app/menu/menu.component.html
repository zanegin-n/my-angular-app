<div style="padding: 20px; max-width: 400px; margin: 0 auto;">
  <h2>Меню выбора</h2>

  <div style="background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
    <p><strong>Выбрано:</strong> {{ selectedTypes }}</p>
    <p><strong>Количество пунктов:</strong> {{ selectedCount }}</p>
    <p><strong>Общая сумма:</strong> {{ totalValue }}</p>
  </div>

  <div *ngFor="let item of menuItems" style="margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
    <label style="display: flex; align-items: center; gap: 10px;">
      <input type="checkbox" [(ngModel)]="item.checked">
      <span>{{ item.name }}</span>
      <span style="margin-left: auto;">Value: {{ item.value }}</span>
    </label>
  </div>

  <a routerLink="/" style="display: inline-block; margin-top: 20px;">← На главную</a>
</div>
